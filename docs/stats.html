<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Analytics│Race Stats</title>
    <link rel="icon" type="image/png" href="../Images/Icons/f1.png">

    <!-- Bootstrap -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <!-- Icons -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <!-- Css -->
    <link rel="stylesheet" href="/styles.css">

    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    </noscript>

</head>

<body class="gradient-custom m-0">

    <!-- Sidebar -->
    <nav id="navbar"></nav>



    <!-- Body -->
    <main id="content" class="p-4">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <h1>Race Stats</h1>
                </div>
            </div>


            <div class="row">
                <div class="col-12 text-center">
                    <form>
                        <select id="driverSelect" class="form-select w-auto mx-auto" onchange="getSelectedOption()">
                            <option value="">Select Driver</option>
                            <option value="63">George Russell</option>
                            <option value="12">Kimi Antonelli</option>
                            <option value="16">Charles Leclerc</option>
                            <option value="44">Lewis Hamilton</option>
                            <option value="1">Lando Norris</option>
                            <option value="81">Oscar Piastri</option>
                            <option value="31">Esteban Ocon</option>
                            <option value="87">Oliver Bearman</option>
                            <option value="10">Pierre Gasly</option>
                            <option value="43">Franco Colapinto</option>
                            <option value="3">Max Verstappen</option>
                            <option value="6">Isack Hadjar</option>
                            <option value="31">Liam Lawson</option>
                            <option value="41">Arvid Lindblad</option>
                            <option value="27">Nico Hulkenberg</option>
                            <option value="5">Gabriel Bortoleto</option>
                            <option value="55">Carlos Sainz</option>
                            <option value="23">Alexander Albon</option>
                            <option value="11">Sergio Perez</option>
                            <option value="77">Valtteri Bottas</option>
                            <option value="14">Fernando Alonso</option>
                            <option value="18">Lance Stroll</option>

                        </select>
                    </form>
                    <input type="hidden" id="selectedValue" value="">
                </div>
            </div>    
            <br>

                
            
            <div class="row">

                <div class="col-8 text-center">
                    <div id="name" class="text-center">Name</div>
                    <div id="number" class="text-center">Number</div>
                    <div id="team" class="text-center">Team</div>
                    <div id="latestRace" class="text-center">Latest</div>
                </div>

                <div class="col-4 text center">
                    <img id="image" class="img-fluid rounded shadow border border-primary" style="max-height: 300px;">



                
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/getStats.js"></script>
    <script src="/scripts/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/placeholder.js"></script>
    <script src="../driverdropdown.js"></script>

</body>

</html>
