<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Analytics│Race Results</title>
    <link rel="icon" type="image/png" href="../Images/Icons/f1.png">

    

    <!-- Bootstrap -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <!-- Icons -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">

    <!-- Css -->
    <link rel="stylesheet" href="/styles.css">

    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    </noscript>

</head>

<body class="gradient-custom m-0">

    <!-- Sidebar -->
    <nav id="navbar"></nav>



    <!-- Body -->
    <main id="content" class="p-4">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <h1>Race Results</h1>
                </div>
            </div>


            <div class="row">
                <div class="col-12 text-center table-responsive">
                    <table class="table table-dark table-responsive">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Driver</th>
                                <th>Team</th>
                                <th>Gap</th>
                                
                            </tr>
                        </thead>
                        <tbody id="raceTable"></tbody>
                    </table>

                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="/scripts/raceResult.js"></script>
    <script src="/scripts/header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/placeholder.js"></script>

</body>

</html>
