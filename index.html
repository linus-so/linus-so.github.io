<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark m-0">

    <!-- Sidebar gets injected here -->
    <div id="navbar"></div>



    <!-- Main content -->
    <div id="content" class="p-4">
        <div class="container">
            
           
            <div class="row">
                <div class="text-center">
                    <h1>Apex Analytics</h1>
                </div>
            </div>

          
            <div class="row">
                <div class="text-center">
                    <h5>Every stat, for everyone</h5>
                </div>
            </div>
        
            <br>
            
            <div class="row">
                <div class="col-1"></div>

                <div class="col-4">
                      <script type="text/placeholder" data-paragraphs="1" data-lines="4" data-animation="wave"></script>
                </div>

                <div class="col-2"></div>

                <div class="col-4">
                    <div class="card" aria-hidden="true">
                        <div class="card-img-top placeholder bg-secondary" style="height: 180px;"></div>
                        <div class="card-body">
                            <h5 class="card-title placeholder-glow">
                                <span class="placeholder col-6"></span>
                            </h5>
                            <p class="card-text placeholder-glow">
                                <span class="placeholder col-7"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-6"></span>
                                <span class="placeholder col-8"></span>
                            </p>
                            <a class="btn btn-danger disabled placeholder col-6" aria-disabled="true"></a>
                        </div>
                    </div>
                </div>

                <div class="col-1"></div>

            </div>

            <br>
            <br>

            <div class="row">
                <div class="col-1"></div>

                <div class="col-4">
                    <div class="card" aria-hidden="true">
                        <div class="card-img-top placeholder bg-secondary" style="height: 180px;"></div>
                        <div class="card-body">
                            <h5 class="card-title placeholder-glow">
                                <span class="placeholder col-6"></span>
                            </h5>
                            <p class="card-text placeholder-glow">
                                <span class="placeholder col-7"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-4"></span>
                                <span class="placeholder col-6"></span>
                                <span class="placeholder col-8"></span>
                            </p>
                            <a class="btn btn-danger disabled placeholder col-6" aria-disabled="true"></a>
                        </div>
                    </div>
                </div>

                <div class="col-2"></div>

                <div class="col-4">
                    <script type="text/placeholder" data-paragraphs="1" data-lines="4" data-animation="wave"></script>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="header.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="placeholder.js"></script>

</body>

</html>
